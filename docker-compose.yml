services:
  fastapi-server:
    build: ./central-server
    container_name: vigilhawk-central-server
    ports:
      - "8050:8000"           # changed host port to 8050
    depends_on:
      - mongo
      - rtsp-server
    environment:
      MONGO_URI: ${MONGO_URI}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped

  detection-server:
    build: ./detection-server
    container_name: vigilhawk-detection-server
    ports:
      - "8051:8001"           # changed host port to 8051
    depends_on:
      - mongo
    volumes:
      - ./videos:/app/videos
    environment:
      MONGO_URI: ${MONGO_URI}
    restart: unless-stopped

  react-server:
    build: ./react-server
    container_name: vigilhawk-react
    volumes:
      - ./react-server/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8082:80"
    depends_on:
      - fastapi-server
      - rtsp-server
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db

  rtsp-server:
    image: bluenviron/mediamtx
    ports:
      - "8554:8554"
    restart: unless-stopped
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro

  rtsp-to-hls:
    image: roverr/rtsp-stream:1
    container_name: rtsp_to_hls
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP port for HLS (usually safe)
    volumes:
      - ./config/rtsp-stream.yml:/app/rtsp-stream.yml:ro
      - ./videos:/app/videos
    environment:
      - RTSP_URL=rtsp://your.camera.ip.address/path  # replace with your RTSP URL
      - RTSP_STREAM_PORT=8080
      - RTSP_STREAM_DEBUG=true

  nginx:
    image: nginx:alpine
    ports:
      - "8083:8083"   # expose nginx on host 8080
    volumes:
      - ./videos:/usr/share/nginx/html/videos
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - detection-server

networks:
  mynet:
    driver: bridge
